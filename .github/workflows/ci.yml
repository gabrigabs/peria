name: CI

on:
  push:
    branches: [main, develop, feat/**]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Check generated docs drift
        run: bun run docs:check

      - name: Validate package contents
        run: bun run pack:check

      - name: Dogfood preview app from packed packages
        run: bun run dogfood:preview

      - name: Dogfood NestJS adapter from packed packages
        run: bun run dogfood:nest

      - name: Validate public NestJS example
        run: bun run example:nest

      - name: Dogfood published npm CLI
        run: bun run dogfood:npm
