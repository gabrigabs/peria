name: Publish to npm

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      # Publish in topological order (leaves first, then dependents)
      # Layer 0: no internal deps
      # Layer 1: depends on core
      # Layer 2: depends on core + renderer
      - name: Publish packages
        run: |
          PACKAGES=(
            packages/core
            packages/adapters
            packages/api-reference
            packages/renderer
            packages/sdk
            packages/cli
          )

          for pkg in "${PACKAGES[@]}"; do
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")

            # Check if this version is already published
            if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
              echo "⏭️  $PKG_NAME@$PKG_VERSION already published, skipping"
            else
              echo "📦 Publishing $PKG_NAME@$PKG_VERSION..."
              npm publish "./$pkg" --provenance --access public
              echo "✅ Published $PKG_NAME@$PKG_VERSION"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
