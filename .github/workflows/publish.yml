name: Publish to npm

on:
  push:
    branches: [main]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    # Skip release commits to avoid infinite loop
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 22.14+ and npm 11.5.1+ required for Trusted Publishers OIDC
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Build all packages (initial)
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bun scripts/version.ts patch

      - name: Push version commit and tag
        run: git push origin main --tags

      - name: Build all packages
        run: bun run build

      # Publish in topological order (leaves first, then dependents)
      - name: Publish packages
        run: |
          PACKAGES=(
            packages/core
            packages/adapters
            packages/api-reference
            packages/renderer
            packages/sdk
            packages/cli
          )

          for pkg in "${PACKAGES[@]}"; do
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")

            if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
              echo "⏭️  $PKG_NAME@$PKG_VERSION already published, skipping"
            else
              echo "📦 Publishing $PKG_NAME@$PKG_VERSION..."
              (cd "$pkg" && npm publish --provenance --access public)
              echo "✅ Published $PKG_NAME@$PKG_VERSION"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          generate_release_notes: true
