openapi: 3.0.0
info:
  title: Peria Example User API
  description: A small API used to validate Peria generated docs.
  version: 1.0.0
paths:
  /users:
    get:
      operationId: getUsers
      summary: List users
      tags:
        - Users
      responses:
        '200':
          description: Users returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      operationId: createUser
      summary: Create user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/{id}:
    get:
      operationId: getUserById
      summary: Get user by ID
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/{id}/approve:
    post:
      operationId: approveUser
      summary: Approve user
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveUserRequest'
      responses:
        '200':
          description: User approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
components:
  schemas:
    User:
      type: object
      required:
        - id
        - email
        - status
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        status:
          type: string
          enum:
            - pending
            - active
            - suspended
    CreateUserRequest:
      type: object
      required:
        - email
        - name
      properties:
        email:
          type: string
          format: email
        name:
          type: string
    ApproveUserRequest:
      type: object
      required:
        - approvedAt
      properties:
        approvedAt:
          type: string
          format: date-time
        approvedBy:
          type: string
